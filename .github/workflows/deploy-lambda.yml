name: Deploy Lambda API

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-lambda.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build and push Lambda image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: clipsense-lambda-api
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd backend
          docker build -f Dockerfile.lambda -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
      
      - name: Update Lambda function
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: clipsense-lambda-api
        run: |
          aws lambda update-function-code \
            --function-name clipsense-api \
            --image-uri $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          echo "Waiting for function update to complete..."
          aws lambda wait function-updated \
            --function-name clipsense-api
      
      - name: Health check
        env:
          API_GATEWAY_URL: ${{ secrets.API_GATEWAY_URL }}
        run: |
          echo "Waiting 10 seconds for Lambda to warm up..."
          sleep 10
          
          echo "Running health check..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" $API_GATEWAY_URL/api/health)
          
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✓ Health check passed (HTTP $HTTP_CODE)"
          else
            echo "✗ Health check failed (HTTP $HTTP_CODE)"
            exit 1
          fi
